syntax = "proto3";

package employee;

service EmployeeGrpc {
  rpc GetEmployee (GetEmployeeRequest) returns (GetEmployeeResponse);
}

message GetEmployeeRequest {
  string id = 1;
}

message GetEmployeeResponse {
  bool found = 1;
  bool isActive = 2;
  string id = 3;
  string name = 4;
  string email = 5;
  string role = 6;
}

